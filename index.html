<body>
    <div id="root"></div>
    
    <!-- Register Service Worker for PWA Installability -->
    <script>
      if ('serviceWorker' in navigator) {
        // When a new service worker takes control (an app update activated),
        // reload once so the user immediately gets the new build instead of a
        // stale cached UI. Guarded so it never loops and never fires on the very
        // first install (when there is no prior controller).
        let refreshing = false;
        if (navigator.serviceWorker.controller) {
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (refreshing) return;
            refreshing = true;
            window.location.reload();
          });
        }
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').then(
            (registration) => {
              console.log('ServiceWorker registration successful with scope: ', registration.scope);
            },
            (err) => {
              console.log('ServiceWorker registration failed: ', err);
            }
          );
        });
      }
    </script>
</body>
