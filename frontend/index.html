<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Keep this app out of search engines (Google, Bing, etc.). The link still works for anyone you share it with. -->
    <meta name="robots" content="noindex, nofollow">
    <!-- iOS specific viewport settings to prevent scaling and handle the notch/dynamic island -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- PWA Manifest and Theme Color -->
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#2563eb">
    
    <!-- iOS Standalone App Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="DrugRadar">
    <link rel="apple-touch-icon" href="./icon.png">
    
    <title>DrugRadar - Drug Approvals</title>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
    
    <!-- Register Service Worker for PWA Installability -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').then(
            (registration) => {
              console.log('ServiceWorker registration successful with scope: ', registration.scope);
            },
            (err) => {
              console.log('ServiceWorker registration failed: ', err);
            }
          );
        });
      }
    </script>
</body>
</html>
